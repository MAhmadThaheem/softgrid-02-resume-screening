<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Screener</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; 
            background: url('/static/bg.png') no-repeat center center fixed; 
            background-size: cover;
            color: #ffffff;
        }
        .container { 
            background: rgba(15, 20, 35, 0.75); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 50px 40px; 
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 15px 45px rgba(0,0,0,0.6), inset 0 0 20px rgba(0, 255, 255, 0.1); 
            width: 100%; max-width: 550px; 
            text-align: center; 
            animation: fadeIn 1s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h1 { 
            color: #00e5ff; 
            margin-bottom: 10px; 
            font-weight: 800; 
            font-size: 2.2rem;
            text-shadow: 0 0 15px rgba(0, 229, 255, 0.6);
        }
        p.subtitle {
            color: #a0abc0;
            font-size: 1rem;
            margin-bottom: 30px;
            font-weight: 300;
        }
        .upload-area { 
            display: block;
            border: 2px dashed rgba(0, 229, 255, 0.5); 
            padding: 40px 20px; 
            border-radius: 12px; 
            background-color: rgba(0, 229, 255, 0.05); 
            cursor: pointer; 
            margin-bottom: 25px; 
            transition: all 0.4s ease; 
            position: relative;
        }
        .upload-area:hover { 
            background-color: rgba(0, 229, 255, 0.15); 
            border-color: #00e5ff;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
            transform: translateY(-2px);
        }
        .upload-area h3 {
            margin: 0 0 5px 0;
            font-size: 1.2rem;
            color: #fff;
        }
        .upload-area p {
            margin: 0;
            font-size: 0.9rem;
            color: #8fa0bd;
        }
        input[type="file"] { display: none; }
        .btn { 
            background: linear-gradient(135deg, #00e5ff, #0077ff); 
            color: #fff; 
            padding: 14px 30px; 
            border: none; 
            border-radius: 50px; 
            font-size: 16px; 
            font-weight: 600;
            cursor: pointer; 
            transition: all 0.3s ease; 
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(0, 119, 255, 0.4);
        }
        .btn:hover { 
            background: linear-gradient(135deg, #00f2ff, #0055ff); 
            box-shadow: 0 8px 25px rgba(0, 229, 255, 0.6);
            transform: translateY(-2px);
        }
        .error { 
            color: #ff4757; 
            background: rgba(255, 71, 87, 0.1);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255, 71, 87, 0.3);
            margin-bottom: 20px; 
            font-weight: 600; 
            animation: shake 0.5s;
        }
        @keyframes shake {
            0%, 100% {transform: translateX(0);}
            25% {transform: translateX(-5px);}
            75% {transform: translateX(5px);}
        }
        #filename {
            color: #00e5ff;
            font-weight: 600;
            margin-top: 15px;
            font-size: 0.95rem;
            word-wrap: break-word;
        }
        /* Icon SVG */
        .upload-icon {
            width: 48px; height: 48px;
            margin-bottom: 15px;
            fill: #00e5ff;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>AI Resume Screener</h1>
    <p class="subtitle">Upload a candidate's resume (PDF/DOCX) to instantly predict their suitability for the role.</p>
    
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form action="/" method="POST" enctype="multipart/form-data">
        <label class="upload-area" for="resume" id="drop-zone">
            <svg class="upload-icon" viewBox="0 0 24 24">
                <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/>
            </svg>
            <h3>Drag & Drop or Click to Upload</h3>
            <p>Supported formats: .pdf, .docx</p>
            <div id="filename"></div>
        </label>
        <input type="file" name="resume" id="resume" accept=".pdf,.docx" required onchange="document.getElementById('filename').innerText = 'Selected: ' + this.files[0].name;">
        
        <button type="submit" class="btn">Analyze Resume</button>
    </form>
</div>

<script>
    // Subtle hover effect for drop zone
    const dropZone = document.getElementById('drop-zone');
    const input = document.getElementById('resume');
    
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.style.backgroundColor = 'rgba(0, 229, 255, 0.2)';
    });
    dropZone.addEventListener('dragleave', (e) => {
        e.preventDefault();
        dropZone.style.backgroundColor = 'rgba(0, 229, 255, 0.05)';
    });
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.style.backgroundColor = 'rgba(0, 229, 255, 0.05)';
        if(e.dataTransfer.files.length) {
            input.files = e.dataTransfer.files;
            document.getElementById('filename').innerText = 'Selected: ' + input.files[0].name;
        }
    });
</script>
</body>
</html>
